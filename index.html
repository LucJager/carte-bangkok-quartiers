<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Carte interactive des quartiers de Bangkok pour digital nomads et expats" />
    <title>Bangkok Quartiers — Guide Interactif</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self';
                   script-src 'self';
                   style-src 'self' https://fonts.googleapis.com 'unsafe-inline';
                   img-src 'self' data: https://*.basemaps.cartocdn.com;
                   connect-src 'self' https://nominatim.openstreetmap.org https://*.basemaps.cartocdn.com https://*.supabase.co;
                   font-src 'self' https://fonts.gstatic.com;
                   object-src 'none';
                   base-uri 'self'" />
  </head>
  <body>
    <header id="top-bar" role="banner">
      <h1>Bangkok — Guide des Quartiers</h1>
    </header>
    <main id="map" role="application" aria-label="Carte interactive de Bangkok"></main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
